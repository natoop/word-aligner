name: word-aligner

services:
  api:
    image: word-aligner:latest
    build:
      context: .
      args:
        PYTORCH_INDEX_URL: https://download.pytorch.org/whl/cu128
    gpus: all
    ports:
      - "8000:8000"
    environment:
      ALIGNER_MODEL: xlmr
      ALIGNER_TOKEN_TYPE: word
      ALIGNER_LAYER: "8"
      ALIGNER_MATCHING_METHODS: mai
      ALIGNER_CONFIDENCE_TEMPERATURE: "0.1"
      ALIGNER_DEVICE: cuda
      ALIGNER_EAGER_LOAD: "true"
      HF_HOME: /models
      HF_MODEL_UPDATE_POLICY: if-missing
    volumes:
      - model-cache:/models
    restart: unless-stopped

volumes:
  model-cache:
    # Reuse the existing cache so the project rename does not redownload XLM-R.
    external: true
    name: word-aligner-models
